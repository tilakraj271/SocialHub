<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">SocialHub</div>
    <ul>
        <li>Home</li>
        <li>Explore</li>
        <li>Profile</li>
    </ul>
</div>

<div class="hero">
    <h1>Welcome To SocialHub</h1>
    <p>Connect • Share • Grow</p>
    <button>Get Started</button>
</div>

<div class="feed">

    <div class="card">
        <h3> Trending Post</h3>
        <p>Welcome to the future of social networking.</p>
    </div>

    <div class="card">
        <h3> New Update</h3>
        <p>Dark mode and premium UI enabled.</p>
    </div>

    <div class="card">
        <h3> Premium Look</h3>
        <p>Glassmorphism + Neon Effects.</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
